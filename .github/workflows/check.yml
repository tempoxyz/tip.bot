name: Check

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pinned known-good Tempo Docker image. Supports tags or sha256 digests.
  VITE_TEMPO_IMAGE: sha256:80769b5615556fcdb9f158de0c699523613fb3901c2df3e58bc770dab106ead1
  WRANGLER_SEND_METRICS: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Audit dependencies
        run: pnpm audit

      - name: Run migrations
        run: |
          rm -rf .wrangler/state
          pnpm run db:migrate

      - name: Generate code
        run: |
          pnpm run db:codegen
          pnpm run gen:types
        env:
          SECRET_KEY: testMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          SLACK_CLIENT_ID: ci-placeholder
          SLACK_CLIENT_SECRET: ci-placeholder
          SLACK_SIGNING_SECRET: ci-placeholder

      - name: Check generated code
        run: git diff --exit-code -- db/types.gen.ts db/schemas.gen.ts src/worker-configuration.d.ts

      - name: Check
        run: pnpm check

      - name: Check types
        run: pnpm check:types

      - name: Build
        run: pnpm build
        env:
          SLACK_APP_ID: ci-placeholder

  test-unit:
    name: Test Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Test unit
        run: pnpm test --project unit --run

  test-workers:
    name: Test Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Cache Tempo Docker image
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/tempo-image.tar
          key: ${{ runner.os }}-tempo-image-${{ env.VITE_TEMPO_IMAGE }}

      - name: Load cached Tempo image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/tempo-image.tar

      - name: Pull and cache Tempo image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          image="ghcr.io/tempoxyz/tempo:${VITE_TEMPO_IMAGE}"
          if [[ "${VITE_TEMPO_IMAGE}" == sha256:* ]]; then image="ghcr.io/tempoxyz/tempo@${VITE_TEMPO_IMAGE}"; fi
          docker pull "${image}"
          docker save "${image}" -o /tmp/tempo-image.tar

      - name: Test workers
        run: pnpm test --project workers --run src/chat.workers.test.ts -t "Slack Connect tip to recipient home workspace member"
        env:
          FEE_PAYER_PRIVATE_KEY_MAINNET: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
          FEE_PAYER_PRIVATE_KEY_TESTNET: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
          SECRET_KEY: testMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          SLACK_CLIENT_ID: ci-placeholder
          SLACK_CLIENT_SECRET: ci-placeholder
          SLACK_SIGNING_SECRET: ci-placeholder

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Build native dependencies
        run: |
          (cd node_modules/better-sqlite3 && ./node_modules/.bin/prebuild-install || node-gyp rebuild --release)
          node -e "new (require('better-sqlite3'))(':memory:').close()"

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30
