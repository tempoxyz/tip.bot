name: Preview Destroy

on:
  pull_request:
    types: [closed, converted_to_draft]

concurrency:
  group: slack-config-ci
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  PREVIEW_APEX: pr${{ github.event.pull_request.number }}
  PREVIEW_HOST: pr${{ github.event.pull_request.number }}.tip.bot
  PREVIEW_NAME: tipbot-pr${{ github.event.pull_request.number }}
  WRANGLER_SEND_METRICS: false

jobs:
  destroy:
    name: Destroy
    if: contains(fromJSON('["COLLABORATOR", "MEMBER", "OWNER"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Read preview state
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --paginate --slurp | jq -r 'map(.[] | select(.body | contains("tipbot-preview"))) | first | .body // ""')
          node - "$BODY" <<'NODE' >> "$GITHUB_OUTPUT"
          const body = process.argv[2] || ''
          const match = body.match(/<!-- tipbot-preview: (.*?) -->/)
          if (!match) process.exit(0)
          const state = JSON.parse(match[1])
          if (state.d1_id) console.log(`d1_id=${state.d1_id}`)
          if (state.slack_app_id) console.log(`slack_app_id=${state.slack_app_id}`)
          const slackAppIds = [
            ...(Array.isArray(state.slack_app_ids) ? state.slack_app_ids : []),
            state.slack_app_id,
          ].filter((value, index, array) => value && array.indexOf(value) === index)
          if (slackAppIds.length) console.log(`slack_app_ids=${JSON.stringify(slackAppIds)}`)
          NODE

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup Slack config token
        if: github.event.pull_request.merged != true && steps.state.outputs.slack_app_ids != ''
        id: slack_token
        continue-on-error: true
        uses: ./.github/actions/setup-slack-config-token
        with:
          github-token: ${{ secrets.SLACK_GH_TOKEN }}
          slack-config-refresh-token: ${{ secrets.SLACK_CONFIG_REFRESH_TOKEN }}
          slack-config-access-token: ${{ secrets.SLACK_CONFIG_ACCESS_TOKEN }}

      - name: Delete Slack preview apps
        if: github.event.pull_request.merged != true && steps.state.outputs.slack_app_ids != '' && steps.slack_token.outputs.token != ''
        continue-on-error: true
        env:
          SLACK_APP_IDS: ${{ steps.state.outputs.slack_app_ids }}
          SLACK_CONFIG_ACCESS_TOKEN: ${{ steps.slack_token.outputs.token }}
        run: |
          set -euo pipefail
          FAILED=0
          while read -r SLACK_APP_ID; do
            BODY=$(jq -nc --arg app_id "$SLACK_APP_ID" '{app_id: $app_id}')
            RESPONSE=$(curl -fsS -X POST https://slack.com/api/apps.manifest.delete \
              -H "Authorization: Bearer ${SLACK_CONFIG_ACCESS_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$BODY" || echo '{"ok":false,"error":"request_failed"}')
            OK=$(echo "$RESPONSE" | jq -r '.ok // false')
            ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')
            if [ "$OK" != "true" ] && [ "$ERROR" != "app_not_found" ] && [ "$ERROR" != "invalid_app_id" ]; then
              echo "$RESPONSE" | jq '{ok,error,errors}'
              FAILED=1
            fi
          done < <(echo "$SLACK_APP_IDS" | jq -r '.[]')
          if [ "$FAILED" != "0" ]; then echo "Slack app cleanup failed; continuing preview cleanup."; fi

      - name: Delete preview Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -fsS -X DELETE \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${PREVIEW_NAME}?force=true" \
            || true

      - name: Delete preview D1
        if: steps.state.outputs.d1_id != ''
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_ID: ${{ steps.state.outputs.d1_id }}
        run: |
          curl -fsS -X DELETE \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${D1_ID}" \
            || true

      - name: Update preview comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          SHA_SHORT=$(echo "$PR_HEAD_SHA" | cut -c1-7)
          UPDATED=$(date -u +"%b %-d, %Y, %-I:%M %p")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '%s\n\n%s\n%s\n%s' \
            "The latest Tipbot preview deployment for ${SHA_SHORT}" \
            "| Name | Status | Preview | Updated (UTC) |" \
            "| :--- | :----- | :------ | :------------ |" \
            "| ${PREVIEW_APEX} | [![Shut Down](https://vercel.com/static/status/canceled.svg) Shut Down](${RUN_URL}) | [${PREVIEW_HOST}](https://${PREVIEW_HOST}) | ${UPDATED} |")
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --paginate --jq '.[] | select(.body | contains("tipbot-preview") or contains("Tipbot preview deployment")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          fi
