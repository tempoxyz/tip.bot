name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

env:
  WRANGLER_SEND_METRICS: false

jobs:
  check:
    name: Check
    uses: ./.github/workflows/check.yml

  preview:
    name: Preview
    # TEMP: disabled on the worker CI profiling PR so iterations do not deploy previews.
    if: false
    needs: check
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/preview_deploy.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      sha: ${{ github.event.pull_request.head.sha }}
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FEE_PAYER_PRIVATE_KEY_MAINNET: ${{ secrets.FEE_PAYER_PRIVATE_KEY_MAINNET }}
      FEE_PAYER_PRIVATE_KEY_TESTNET: ${{ secrets.FEE_PAYER_PRIVATE_KEY_TESTNET }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SLACK_CONFIG_REFRESH_TOKEN: ${{ secrets.SLACK_CONFIG_REFRESH_TOKEN }}
      SLACK_GH_TOKEN: ${{ secrets.SLACK_GH_TOKEN }}
      SLACK_CONFIG_TOKEN: ${{ secrets.SLACK_CONFIG_TOKEN }}
