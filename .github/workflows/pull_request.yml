name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  WRANGLER_SEND_METRICS: false

jobs:
  check:
    name: Check
    uses: ./.github/workflows/check.yml

  preview:
    name: Preview
    if: github.event.pull_request.draft == false && contains(fromJSON('["COLLABORATOR", "MEMBER", "OWNER"]'), github.event.pull_request.author_association)
    needs: check
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/preview_deploy.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      sha: ${{ github.event.pull_request.head.sha }}
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DJBOX_PARTY_ID: ${{ secrets.DJBOX_PARTY_ID }}
      DJBOX_SECRET: ${{ secrets.DJBOX_SECRET }}
      DJBOX_URL: ${{ secrets.DJBOX_URL }}
      DJ_HOUSE_PROVIDER_USER_ID: ${{ secrets.DJ_HOUSE_PROVIDER_USER_ID }}
      FEE_PAYER_PRIVATE_KEY_MAINNET: ${{ secrets.FEE_PAYER_PRIVATE_KEY_MAINNET }}
      FEE_PAYER_PRIVATE_KEY_TESTNET: ${{ secrets.FEE_PAYER_PRIVATE_KEY_TESTNET }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SLACK_CONFIG_ACCESS_TOKEN: ${{ secrets.SLACK_CONFIG_ACCESS_TOKEN }}
      SLACK_CONFIG_REFRESH_TOKEN: ${{ secrets.SLACK_CONFIG_REFRESH_TOKEN }}
      SLACK_GH_TOKEN: ${{ secrets.SLACK_GH_TOKEN }}
