allowBuilds:
  better-sqlite3@12.9.0: true
  cpu-features@0.0.10: true
  esbuild@0.27.3: true
  esbuild@0.28.1: true
  lightningcss@1.32.0: true
  msw: true
  protobufjs@7.5.8: true
  protobufjs@7.6.3: true
  sharp@0.34.5: true
  ssh2@1.17.0: true
  workerd@1.20260426.1: true
  workerd@1.20260504.1: true
  workerd@1.20260507.1: true
  workerd@1.20260511.1: true
auditConfig:
  # @tanstack/history is required by latest TanStack Router/Start. Audit marks all
  # versions vulnerable with no patched release, so ignore until a fix exists.
  ignoreGhsas:
    - GHSA-rmmr-r34h-pfm5
blockExoticSubdeps: true
catalog:
  # Vite+ dependency aliases.
  vite: npm:@voidzero-dev/vite-plus-core@0.1.24
  vite-plus: 0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
dangerouslyAllowAllBuilds: false
enableGlobalVirtualStore: true
linkWorkspacePackages: false
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - accounts
  - mppx
  - tmp
  - viem
  - '@babel/core@7.29.6'
  - shell-quote@1.8.4
  - '@grpc/grpc-js@1.14.4'
  - esbuild@0.28.1
  - protobufjs@7.6.3
  - form-data@4.0.6
  - tar@7.5.16
  - vite-plus@0.1.24
  - launch-editor@2.14.1
  - hono@4.12.25
  - undici@7.28.0
  - js-yaml@4.3.0
  - ws@8.21.0
minimumReleaseAgeStrict: true
overrides:
  '@babel/core': 7.29.6
  '@grpc/grpc-js': 1.14.4
  esbuild: 0.28.1
  form-data: 4.0.6
  hono: 4.12.25
  js-yaml: 4.3.0
  launch-editor: 2.14.1
  protobufjs: 7.6.3
  shell-quote: 1.8.4
  tar: 7.5.16
  tmp: 0.2.7
  undici: 7.28.0
  uuid: 11.1.1
  vite: 'catalog:'
  vite-plus: 0.1.24
  vitest: 'catalog:'
  ws: 8.21.0
packageExtensions:
  '@cloudflare/vitest-pool-workers@*':
    dependencies:
      undici: 7.28.0
  '@svgr/core@*':
    dependencies:
      '@svgr/plugin-jsx': 8.1.0
  '@voidzero-dev/vite-plus-core@*':
    dependencies:
      vite-plus: 0.1.24
  local-pkg@*:
    dependencies:
      '@svgr/core': 8.1.0
patchedDependencies:
  '@chat-adapter/slack@4.27.0': config/patches/@chat-adapter__slack@4.27.0.patch
  '@slack/web-api@7.15.2': config/patches/@slack__web-api@7.15.2.patch
  # TODO: Remove when TanStack Start server entry no longer eagerly resolves virtual router modules during Worker test startup.
  # Related: https://github.com/cloudflare/workers-sdk/issues/11100
  '@tanstack/react-start@1.167.65': config/patches/@tanstack__react-start@1.167.65.patch
  emulate@0.5.0: config/patches/emulate@0.5.0.patch
  prool@0.2.4: config/patches/prool@0.2.4.patch
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    accounts: 0.14.1
    vite: '*'
    vitest: '*'
strictDepBuilds: true
strictPeerDependencies: true
